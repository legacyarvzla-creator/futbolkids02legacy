<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" embedded>
    <a-assets>
      <video id="miVideo" src="FUTBOLKIDS_legacy02.mp4" loop="true" playsinline crossorigin="anonymous" muted="true" autoplay></video>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#miVideo" width="1" height="1.77" rotation="0 0 0" position="0 0 0"></a-video>
    </a-entity>
  </a-scene>
  <script>
    const video = document.getElementById('miVideo');
    // Forzamos el play al tocar cualquier lugar
    document.body.addEventListener('click', () => { video.play(); });
  </script>
</body>
</html>
