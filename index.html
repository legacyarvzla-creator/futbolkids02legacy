<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FutbolKids AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; text-align: center; }
        #ui { position: absolute; z-index: 9999; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="startOverlay" onclick="iniciarExperiencia()">
        <h1>Toca la pantalla<br>para iniciar con audio</h1>
    </div>

    <div id="ui">
        <button id="recordBtn" class="btn">REC</button>
        <button id="torchBtn" class="btn">💡</button>
    </div>

    <video id="miVideo" 
           src="futbol_final_v2.mp4" 
           loop="true" 
           playsinline="true" 
           webkit-playsinline="true" 
           crossorigin="anonymous" 
           preload="auto" 
           muted="true" 
           style="display:none"></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             renderer="colorManagement: true, alpha: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-plane src="#miVideo" width="1" height="1.77" position="0 0 0" rotation="0 0 0" material="shader: flat; src: #miVideo;"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#miVideo');
        const overlay = document.querySelector('#startOverlay');
        const recordBtn = document.querySelector('#recordBtn');

        // Función para activar audio y quitar la pantalla de inicio
        function iniciarExperiencia() {
            overlay.style.display = 'none';
            video.muted = false; 
            video.play();
        }

        // Activación al encontrar el marcador
        document.querySelector('#target').addEventListener("targetFound", () => {
            video.play();
        });

        document.querySelector('#target').addEventListener("targetLost", () => {
            video.pause();
        });

        // Grabación mejorada con soporte de audio
        recordBtn.addEventListener('click', async () => {
            try {
                // IMPORTANTE: El usuario debe elegir "Compartir audio" en el menú del celular
                const stream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
                const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
                let chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, {type: 'video/webm'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'FutbolKids_Grabacion.webm';
                    a.click();
                };
                recorder.start();
                recordBtn.innerText = "⏹️";
                stream.getVideoTracks()[0].onended = () => recorder.stop();
            } catch (err) { alert("Error: Asegúrate de marcar 'Compartir audio' al grabar."); }
        });

        // Linterna
        document.querySelector('#torchBtn').addEventListener('click', async () => {
            const system = document.querySelector('a-scene').systems["mindar-image-system"];
            if (system && system.video && system.video.srcObject) {
                const track = system.video.srcObject.getVideoTracks()[0];
                if (track && track.getCapabilities().torch) {
                    await track.applyConstraints({advanced: [{torch: true}]});
                }
            }
        });
    </script>
</body>
</html>
