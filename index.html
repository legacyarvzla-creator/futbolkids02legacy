<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <button id="flashlightBtn" style="position: absolute; z-index: 1000; bottom: 20px; left: 20px;">
    Linterna
  </button>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" embedded renderer="colorManagement: true" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <video id="miVideo" src="tu_video.mp4" loop="true" playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0"></a-entity>
    <a-entity mindar-image-target="targetIndex: 1"></a-entity>
    <a-entity mindar-image-target="targetIndex: 2"></a-entity>
    
    <a-video src="#miVideo" width="1" height="0.56" position="0 0 0"></a-video>
  </a-scene>

  <script>
    const video = document.querySelector('#miVideo');
    const btn = document.querySelector('#flashlightBtn');
    let track = null;

    // Lógica para la linterna (Torch)
    btn.addEventListener('click', async () => {
      const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
      track = stream.getVideoTracks()[0];
      const capabilities = track.getCapabilities();
      if (capabilities.torch) {
        track.applyConstraints({advanced: [{torch: true}]});
      }
    });

    // Reproducir video al encontrar marcador
    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener("targetFound", () => { video.play(); });
    sceneEl.addEventListener("targetLost", () => { video.pause(); });
  </script>
</body>
</html>
