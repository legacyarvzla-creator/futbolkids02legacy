<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutbolKids AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 15px; }
        button { padding: 15px 30px; border-radius: 25px; border: none; background: rgba(0,0,0,0.7); color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="document.querySelector('#miVideo').play()">Reproducir Audio</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="miVideo" src="FUTBOLKIDS_legacy02.mp4" loop="true" playsinline crossorigin="anonymous" muted="true"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#miVideo" width="1" height="1.77" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#miVideo');
        const target = document.querySelector('#target');

        // Al detectar, inicia el video en silencio (esto evita el cuadro negro)
        target.addEventListener("targetFound", () => {
            video.muted = true;
            video.play();
        });

        target.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
