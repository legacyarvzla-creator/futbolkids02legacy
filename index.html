<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FutbolKids AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #ui { position: absolute; z-index: 9999; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(0,0,0,0.6); color: white; border: 2px solid white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="recordBtn" class="btn">REC</button>
        <button id="torchBtn" class="btn">💡</button>
    </div>

    <video id="miVideo" 
           src="futbol_final_v1.mp4" 
           loop="true" 
           playsinline="true" 
           webkit-playsinline="true" 
           crossorigin="anonymous" 
           preload="auto" 
           muted="true" 
           style="display:none"></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             renderer="colorManagement: true, alpha: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-video src="#miVideo" width="1" height="1.77" position="0 0 0" rotation="0 0 0" shader="flat"></a-video>
</a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#miVideo');
        const target = document.querySelector('#target');
        const recordBtn = document.querySelector('#recordBtn');

        // Activación al encontrar el marcador
        target.addEventListener("targetFound", () => {
            video.muted = true; // Forzamos silencio para asegurar reproducción
            video.play().catch(e => console.log("Requerida interacción"));
        });

        target.addEventListener("targetLost", () => {
            video.pause();
        });

        // Grabación nativa de pantalla (la más estable)
        recordBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
                const recorder = new MediaRecorder(stream);
                let chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, {type: 'video/mp4'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'FutbolKids_Grabacion.mp4';
                    a.click();
                };
                recorder.start();
                recordBtn.innerText = "STOP";
                stream.getVideoTracks()[0].onended = () => recorder.stop();
            } catch (err) { alert("Error al grabar: " + err); }
        });

        // Linterna
        document.querySelector('#torchBtn').addEventListener('click', async () => {
            const track = document.querySelector('a-scene').systems["mindar-image-system"].video.srcObject.getVideoTracks()[0];
            if (track.getCapabilities().torch) await track.applyConstraints({advanced: [{torch: true}]});
        });
    </script>
</body>
</html>
``
