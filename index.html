<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FutbolKids AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #startOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 20000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; text-align: center; font-family: sans-serif; }
        #ui { position: absolute; z-index: 9999; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.1); color: white; border: 1px solid white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; backdrop-filter: blur(5px); }
        #guideMsg { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: rgba(0,0,0,0.95); color: white; padding: 25px; border-radius: 20px; text-align: center; z-index: 9999; border: 1px solid white; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="startOverlay" onclick="iniciarExperiencia()">
        <div>
            <h1>FUTBOLKIDS</h1>
            <p>Toca para iniciar la experiencia</p>
        </div>
    </div>

    <div id="guideMsg">
        <p>Para grabar con audio, usa el grabador de pantalla nativo de tu celular antes de enfocar.</p>
        <button onclick="document.getElementById('guideMsg').style.display='none'" style="padding:10px 20px; border-radius:10px; border:none; cursor:pointer;">Entendido</button>
    </div>

    <div id="ui">
        <button id="guideBtn" class="btn">📹</button>
        <button id="torchBtn" class="btn">💡</button>
    </div>

    <video id="miVideo" 
           src="futbol_final_v2.mp4" 
           loop="true" 
           playsinline="true" 
           webkit-playsinline="true" 
           crossorigin="anonymous" 
           preload="auto" 
           muted="true" 
           style="display:none"></video>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" 
             renderer="colorManagement: true, alpha: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-plane src="#miVideo" width="1" height="1.77" position="0 0 0" rotation="0 0 0" material="shader: flat; src: #miVideo;"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#miVideo');
        const overlay = document.querySelector('#startOverlay');

        function iniciarExperiencia() {
            overlay.style.display = 'none';
            video.muted = false; 
            video.play();
        }

        document.querySelector('#target').addEventListener("targetFound", () => {
            video.play();
        });

        document.querySelector('#target').addEventListener("targetLost", () => {
            video.pause();
        });

            document.getElementById('guideMsg').style.display = 'block';
        };
