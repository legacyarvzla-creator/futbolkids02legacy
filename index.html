<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    .ui-container { position: absolute; z-index: 1000; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; }
    button { padding: 12px 20px; border-radius: 25px; border: none; background: rgba(0,0,0,0.6); color: white; font-family: sans-serif; cursor: pointer; }
  </style>
</head>
<body>

  <div class="ui-container">
    <button id="torchBtn">Linterna</button>
    <a href="tu_video_optimizado.mp4" download="LegacyAR_Video.mp4"><button>Descargar</button></a>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <video id="miVideo" src="tu_video_optimizado.mp4" loop="true" playsinline crossorigin="anonymous" muted="true" autoplay></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane src="#miVideo" width="1" height="1.77" rotation="0 0 0" position="0 0 0" material="shader: flat; src: #miVideo"></a-plane>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 1">
      <a-plane src="#miVideo" width="1" height="1.77" rotation="0 0 0" position="0 0 0" material="shader: flat; src: #miVideo"></a-plane>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 2">
      <a-plane src="#miVideo" width="1" height="1.77" rotation="0 0 0" position="0 0 0" material="shader: flat; src: #miVideo"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const video = document.querySelector('#miVideo');
    const torchBtn = document.querySelector('#torchBtn');

    // Forzar inicio al tocar cualquier parte
    window.addEventListener('click', () => {
      video.play();
    }, { once: true });

    // Lógica linterna
    torchBtn.addEventListener('click', async () => {
      const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
      const track = stream.getVideoTracks()[0];
      const cap = track.getCapabilities();
      if (cap.torch) track.applyConstraints({advanced: [{torch: true}]});
    });
  </script>
</body>
</html>
