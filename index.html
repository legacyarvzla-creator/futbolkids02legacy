<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    .ui-container { position: absolute; z-index: 1000; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 20px; }
    button { padding: 12px 20px; border-radius: 25px; border: none; background: rgba(0,0,0,0.6); color: white; font-family: sans-serif; cursor: pointer; }
  </style>
</head>
<body>

  <div class="ui-container">
    <button id="torchBtn">Linterna</button>
    <button id="recordBtn">Grabar</button>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" renderer="colorManagement: true" vr-mode-ui="enabled: false">
    <a-assets>
      <video id="miVideo" src="FUTBOLKIDS_legacy02.mp4" loop="true" playsinline crossorigin="anonymous"></video>
    </a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0"><a-plane src="#miVideo" width="1" height="1.77" rotation="0 0 0" material="shader: flat; src: #miVideo"></a-plane></a-entity>
    <a-entity mindar-image-target="targetIndex: 1"><a-plane src="#miVideo" width="1" height="1.77" rotation="0 0 0" material="shader: flat; src: #miVideo"></a-plane></a-entity>
    <a-entity mindar-image-target="targetIndex: 2"><a-plane src="#miVideo" width="1" height="1.77" rotation="0 0 0" material="shader: flat; src: #miVideo"></a-plane></a-entity>
  </a-scene>

  <script>
    const video = document.querySelector('#miVideo');
    const recordBtn = document.querySelector('#recordBtn');
    let mediaRecorder;
    let recordedChunks = [];

    // Lógica de Grabación de Pantalla + Cámara (Lo que ve el usuario)
    recordBtn.addEventListener('click', async () => {
      if (recordBtn.innerText === "Grabar") {
        const stream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = exportVideo;
        mediaRecorder.start();
        recordBtn.innerText = "Detener";
      } else {
        mediaRecorder.stop();
        recordBtn.innerText = "Grabar";
      }
    });

    function exportVideo() {
      const blob = new Blob(recordedChunks, {type: "video/mp4"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mi_video_ar.mp4";
      a.click();
    }

    // Audio: Intentamos desbloquear al primer toque
    window.addEventListener('click', () => { video.play(); }, { once: true });
  </script>
</body>
</html>
